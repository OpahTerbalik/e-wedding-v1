<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walimatul Urus | Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="songs/bg-song.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="cover-page" class="cover-container">
        <div class="curtain curtain-left"></div>
        <div class="curtain curtain-right"></div>
        
        <div class="intro-content">
            <div class="icon-ring">
                <i class="fa-solid fa-ring"></i>
            </div>
            <h1 class="bismillah">﷽</h1>
            <p class="subtitle">Walimatul Urus</p>
            <button id="open-btn" class="press-me-btn">Open Invitation</button>
        </div>
    </div>

    <div id="main-page" class="main-container hidden">
        
        <div class="decorations">
            <img src="images/flower-corner.png" class="flower flower-top-left" alt="Flower Decor">
            <img src="images/flower-corner.png" class="flower flower-bottom-right" alt="Flower Decor">
            
            <div class="bird-container">
                <div class="bird">🕊️</div>
                <div class="bird bird-delayed">🕊️</div>
            </div>
        </div>

        <div class="stage-section">
            <div class="stage-background">
                <div class="podium">
                    <div class="couple-placeholder">
                        <img src="images/malay-bride.png" alt="Bride and Groom on Stage" class="couple-img">
                        <p class="placeholder-text">[Insert Couple Image Here]</p>
                    </div>
                </div>
            </div>
            
            <div class="wedding-details">
                <h2>Ahmad & Fatimah</h2>
                <p>Are getting married</p>
                <p class="date">Saturday, 25 December 2026</p>
            </div>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
